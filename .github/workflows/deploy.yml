name: Build and Deploy FloTr (API + React)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20'
  API_PROJECT: FloorballTraining.API
  FLOTR_DIR: FloTr

jobs:
  # ── Job 1: Build .NET API ──
  build-api:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore .NET dependencies
      run: dotnet restore ${{ env.API_PROJECT }}

    - name: Publish API
      run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --output ./publish

    - name: Upload API artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-publish
        path: ./publish/
        retention-days: 1

  # ── Job 2: Build React Frontend ──
  build-frontend:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.FLOTR_DIR }}/package-lock.json

    - name: Install npm dependencies
      working-directory: ${{ env.FLOTR_DIR }}
      run: npm ci

    - name: Build React app
      working-directory: ${{ env.FLOTR_DIR }}
      run: npm run build

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: ${{ env.FLOTR_DIR }}/dist/
        retention-days: 1

  # ── Job 3: Combine & Deploy (runs only after both builds succeed) ──
  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    steps:
    - name: Download API artifact
      uses: actions/download-artifact@v4
      with:
        name: api-publish
        path: ./publish/

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: ./publish/wwwroot/

    - name: Set production config
      env:
        DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        JWT_KEY: ${{ secrets.JWT_SECRET_KEY }}
      run: |
        python3 -c "
        import os
        f = './publish/appsettings.Production.json'
        content = open(f).read()
        content = content.replace('__DB_CONNECTION_STRING__', os.environ['DB_CONN'])
        content = content.replace('__JWT_SECRET_KEY__', os.environ['JWT_KEY'])
        open(f, 'w').write(content)
        "

    - name: Remove unnecessary folders (localization, non-Windows runtimes)
      run: |
        cd ./publish
        # Remove localization satellite assemblies
        rm -rf cs de es fr it ja ko pl pt-BR ru tr zh-Hans zh-Hant
        # Remove non-Windows runtimes (target is Windows hosting)
        cd runtimes 2>/dev/null && rm -rf linux* osx* unix* && cd .. || true
        echo "Remaining publish structure:"
        find . -type d | head -40

    - name: Upload to FTP via lftp
      run: |
        lftp -e "
          set ftp:ssl-allow yes;
          set ftp:ssl-protect-data yes;
          set ssl:verify-certificate no;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
          mirror --reverse --verbose --delete --parallel=4 \
            --exclude rajony/ --exclude match/ --exclude badminton/ \
            ./publish/ ${{ secrets.FTP_SERVER_DIR }};
          bye;
        "
