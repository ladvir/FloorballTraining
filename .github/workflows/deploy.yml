name: Deploy to Production (FTP)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: windows-latest
    environment: Production
    steps:
      - name: Check required secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_FRONTEND_PATH: ${{ secrets.FTP_FRONTEND_PATH }}
          FTP_BACKEND_PATH: ${{ secrets.FTP_BACKEND_PATH }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
          SMTP_FROM_ADDRESS: ${{ secrets.SMTP_FROM_ADDRESS }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          missing=0
          for secret in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_FRONTEND_PATH FTP_BACKEND_PATH DB_CONNECTION_STRING JWT_SECRET_KEY FRONTEND_BASE_URL SMTP_FROM_ADDRESS SMTP_SERVER SMTP_USERNAME SMTP_PASSWORD; do
            if [ -z "${!secret}" ]; then
              echo "❌ Secret $secret is not set!"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Aborting: One or more required secrets are missing."
            exit 1
          fi
          echo "✅ All required secrets are set."
        shell: bash

  build-backend:
    runs-on: windows-latest
    needs: check-secrets
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create appsettings.Production.json
        working-directory: FloorballTraining.API
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_KEY }}
          ALLOWED_ORIGINS_RAW: ${{ secrets.ALLOWED_ORIGINS }}
          FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          SMTP_FROM_ADDRESS: ${{ secrets.SMTP_FROM_ADDRESS }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          if ! echo "$ALLOWED_ORIGINS_RAW" | jq -e . >/dev/null 2>&1; then
            ALLOWED_ORIGINS_RAW="[]"
          fi
          : "${SMTP_FROM_NAME:=FloTr}"
          : "${SMTP_PORT:=465}"
          jq -n \
            --arg db "$DB_CONN" \
            --arg jwt "$JWT_SECRET" \
            --argjson origins "$ALLOWED_ORIGINS_RAW" \
            --arg frontendUrl "$FRONTEND_BASE_URL" \
            --arg fromName "$SMTP_FROM_NAME" \
            --arg fromAddr "$SMTP_FROM_ADDRESS" \
            --arg smtpServer "$SMTP_SERVER" \
            --argjson smtpPort "$SMTP_PORT" \
            --arg smtpUser "$SMTP_USERNAME" \
            --arg smtpPass "$SMTP_PASSWORD" \
            '{
              ConnectionStrings: { FloorballTraining: $db },
              JwtSettings: {
                SecretKey: $jwt,
                Issuer: "FloTr",
                Audience: "FloTr",
                TokenExpirationMinutes: "60"
              },
              FrontendBaseUrl: $frontendUrl,
              EmailConfiguration: {
                FromName: $fromName,
                FromAddress: $fromAddr,
                SmtpServer: $smtpServer,
                Port: $smtpPort,
                Username: $smtpUser,
                Password: $smtpPass
              },
              Logging: {
                LogLevel: {
                  Default: "Information",
                  "Microsoft.AspNetCore": "Warning",
                  FloorballTraining: "Information"
                }
              },
              AllowedHosts: "*",
              ALLOWED_ORIGINS: $origins
            }' > appsettings.Production.json
        shell: bash

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          dotnet-version: '9.0.x'

      - name: Restore backend dependencies
        run: dotnet restore FloorballTraining.API/FloorballTraining.API.csproj

      - name: Build backend
        run: dotnet build FloorballTraining.API/FloorballTraining.API.csproj -c Release --no-restore

      - name: Apply EF Core migrations
        env:
          ConnectionStrings__FloorballTraining: ${{ secrets.DB_CONNECTION_STRING }}
          ASPNETCORE_ENVIRONMENT: Production
        run: |
          dotnet new tool-manifest --force
          dotnet tool install dotnet-ef --version 8.*
          dotnet tool restore
          dotnet ef database update \
            -v \
            --configuration Release \
            --no-build \
            --project FloorballTraining.Plugins.EFCoreSqlServer/FloorballTraining.Plugins.EFCoreSqlServer.csproj \
            --startup-project FloorballTraining.API/FloorballTraining.API.csproj
        shell: bash

      - name: Publish backend
        run: dotnet publish FloorballTraining.API/FloorballTraining.API.csproj -c Release -o ./publish --no-build

      - name: Remove unnecessary folders
        run: |
          cd ./publish
          rm -rf cs de es fr it ja ko pl pt-BR ru tr zh-Hans zh-Hant
          cd runtimes 2>/dev/null && rm -rf linux* osx* unix* && cd .. || true
        shell: bash

      - name: Create logs directory
        run: mkdir -p ./publish/logs
        shell: bash

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ./publish/

  build-frontend:
    runs-on: windows-latest
    needs: check-secrets
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: FloTr/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./FloTr
        run: npm ci

      - name: Check frontend formatting
        working-directory: ./FloTr
        run: npm run format:check

      - name: Build frontend
        working-directory: ./FloTr
        env:
          VITE_API_URL: '/flotr/api'
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./FloTr/dist/

  deploy-backend:
    runs-on: windows-latest
    needs: build-backend
    environment: Production
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./backend-publish/

      - name: Ensure FTP backend path ends with slash
        run: |
          path="${{ secrets.FTP_BACKEND_PATH }}"
          if [ -z "$path" ]; then
            echo "FTP_BACKEND_PATH_SLASH=" >> $GITHUB_ENV
          elif [ "${path: -1}" = "/" ]; then
            echo "FTP_BACKEND_PATH_SLASH=$path" >> $GITHUB_ENV
          else
            echo "FTP_BACKEND_PATH_SLASH=$path/" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Deploy backend to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend-publish/
          server-dir: ${{ env.FTP_BACKEND_PATH_SLASH }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.vscode/**
            **/.idea/**

  deploy-frontend:
    runs-on: windows-latest
    needs: build-frontend
    environment: Production
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist/

      - name: Ensure FTP frontend path ends with slash
        run: |
          path="${{ secrets.FTP_FRONTEND_PATH }}"
          if [ -z "$path" ]; then
            echo "FTP_FRONTEND_PATH_SLASH=" >> $GITHUB_ENV
          elif [ "${path: -1}" = "/" ]; then
            echo "FTP_FRONTEND_PATH_SLASH=$path" >> $GITHUB_ENV
          else
            echo "FTP_FRONTEND_PATH_SLASH=$path/" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Deploy frontend to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend-dist/
          server-dir: ${{ env.FTP_FRONTEND_PATH_SLASH }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.vscode/**

      - name: Deployment completed
        run: echo "✅ Deployment completed successfully!"
