name: CI (build & test)

on:
  pull_request:
  push:
    branches:
      - master

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build & test)
    # Match deploy.yml: the app is built and deployed on Windows.
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore FloorballTraining.sln

      - name: Build
        run: dotnet build FloorballTraining.sln -c Release --no-restore

      - name: Test
        run: dotnet test FloorballTraining.sln -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (lint & test)
    # Match deploy.yml's build-frontend job.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./FloTr
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: FloTr/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm test
